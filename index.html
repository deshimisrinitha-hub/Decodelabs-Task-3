<!DOCTYPE html>
<html>

<head>

<title>IoT Monitoring Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>IoT Data Monitoring Dashboard</h1>


<div class="card">

<h2>Temperature</h2>

<p id="temp">0 °C</p>

</div>


<div class="card">

<h2>Humidity</h2>

<p id="humidity">0 %</p>

</div>



<h2>Sensor Data Table</h2>


<table>

<tr>
<th>Time</th>
<th>Temperature</th>
<th>Humidity</th>
</tr>


<tbody id="data">

</tbody>


</table>


<script src="script.js"></script>


</body>

</html>
